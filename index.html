<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NoName | Cargando</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      overflow: hidden;
      font-family: Georgia, 'Times New Roman', serif;
      color: #f7e7b4;
      background:
        radial-gradient(circle at 20% 25%, rgba(148, 55, 255, .55), transparent 30%),
        radial-gradient(circle at 80% 10%, rgba(218, 165, 32, .22), transparent 25%),
        linear-gradient(135deg, #12051f 0%, #27103c 45%, #09040f 100%);
    }

    .mist, .stars, .spell-ring, .gold-sparks { position: fixed; inset: 0; pointer-events: none; }

    .mist {
      background:
        radial-gradient(circle at 15% 80%, rgba(140, 55, 255, .28), transparent 35%),
        radial-gradient(circle at 70% 70%, rgba(92, 32, 160, .35), transparent 32%);
      filter: blur(8px);
      animation: mistMove 12s ease-in-out infinite alternate;
    }

    .stars {
      background-image:
        radial-gradient(#fff 1px, transparent 1px),
        radial-gradient(#d6a94a 1px, transparent 1px);
      background-size: 90px 90px, 140px 140px;
      opacity: .45;
      animation: twinkle 4s linear infinite;
    }

    .spell-ring {
      width: 720px;
      height: 720px;
      border: 1px solid rgba(211, 166, 74, .35);
      border-radius: 50%;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 55px rgba(135, 54, 255, .45), inset 0 0 45px rgba(213, 165, 55, .12);
      animation: rotate 18s linear infinite;
    }

    .spell-ring::before,
    .spell-ring::after {
      content: "✦ ✧ ✺ ✧ ✦ ✧ ✺ ✧ ✦";
      position: absolute;
      inset: 42px;
      border: 1px dashed rgba(246, 214, 141, .28);
      border-radius: 50%;
      display: grid;
      place-items: start center;
      font-size: 28px;
      letter-spacing: 18px;
      color: rgba(246, 214, 141, .65);
    }

    .spell-ring::after {
      inset: 110px;
      animation: rotateReverse 12s linear infinite;
      color: rgba(174, 91, 255, .75);
    }

    .container {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
      z-index: 2;
    }

    .crest {
      width: 86px;
      height: 86px;
      margin-bottom: 24px;
      border: 2px solid rgba(230, 181, 76, .8);
      transform: rotate(45deg);
      display: grid;
      place-items: center;
      box-shadow: 0 0 30px rgba(218, 165, 32, .3);
      background: rgba(20, 5, 35, .42);
    }

    .crest span {
      transform: rotate(-45deg);
      font-size: 46px;
      font-weight: bold;
      color: #f4d783;
      text-shadow: 0 0 18px rgba(255, 218, 108, .75);
    }

    h1 {
      font-size: clamp(70px, 11vw, 150px);
      font-weight: 400;
      letter-spacing: 3px;
      background: linear-gradient(180deg, #fff1b8, #d9a441 48%, #865d19);
      -webkit-background-clip: text;
      color: transparent;
      text-shadow: 0 0 35px rgba(208, 142, 255, .42);
    }

    .subtitle {
      margin-top: 10px;
      font-size: 18px;
      letter-spacing: 8px;
      text-transform: uppercase;
      color: rgba(246, 214, 141, .78);
    }

    .loader {
      width: min(620px, 82vw);
      height: 22px;
      margin-top: 58px;
      border: 1px solid rgba(245, 201, 91, .75);
      border-radius: 999px;
      padding: 3px;
      background: rgba(12, 3, 20, .72);
      box-shadow: 0 0 26px rgba(156, 75, 255, .45), inset 0 0 16px rgba(0,0,0,.65);
    }

    .bar {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, #6c1fb8, #c261ff, #f0c45e);
      box-shadow: 0 0 22px rgba(191, 94, 255, .9);
      animation: loading 8s ease-in-out infinite;
    }

    .loading-text {
      margin-top: 18px;
      font-size: 16px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: rgba(255, 236, 180, .85);
    }

    .footer {
      position: fixed;
      bottom: 28px;
      width: 100%;
      text-align: center;
      font-family: Arial, sans-serif;
      letter-spacing: 4px;
      font-size: 12px;
      color: rgba(255, 220, 148, .62);
      z-index: 2;
    }

    .spark {
      position: fixed;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #f1c85b;
      box-shadow: 0 0 12px #f1c85b;
      animation: floatSpark linear infinite;
      pointer-events: none;
    }

    .border {
      position: fixed;
      inset: 18px;
      border: 1px solid rgba(220, 164, 62, .55);
      box-shadow: inset 0 0 18px rgba(220, 164, 62, .18);
      pointer-events: none;
      z-index: 3;
    }

    .border::before, .border::after {
      content: "✦";
      position: absolute;
      color: #e0ad4e;
      font-size: 24px;
      left: 50%;
      transform: translateX(-50%);
    }
    .border::before { top: -14px; }
    .border::after { bottom: -14px; }

    @keyframes loading {
      0% { width: 8%; }
      50% { width: 78%; }
      100% { width: 98%; }
    }
    @keyframes rotate { to { transform: translate(-50%, -50%) rotate(360deg); } }
    @keyframes rotateReverse { to { transform: rotate(-360deg); } }
    @keyframes mistMove { to { transform: scale(1.1) translate(25px, -20px); } }
    @keyframes twinkle { 50% { opacity: .75; transform: scale(1.02); } }
    @keyframes floatSpark {
      from { transform: translateY(110vh) scale(.5); opacity: 0; }
      15% { opacity: 1; }
      to { transform: translateY(-10vh) scale(1.3); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="mist"></div>
  <div class="stars"></div>
  <div class="spell-ring"></div>
  <div class="border"></div>

  <main class="container">
    <div class="crest"><span>N</span></div>
    <h1>NoName</h1>
    <div class="subtitle">Roleplay mágico</div>
    <div class="loader"><div class="bar"></div></div>
    <div class="loading-text">Cargando hechizos...</div>
  </main>

  <div class="footer">POWERED BY PHYSGUN · GARRY'S MOD</div>

  <script>
    const totalSparks = 42;
    for (let i = 0; i < totalSparks; i++) {
      const spark = document.createElement('div');
      spark.className = 'spark';
      spark.style.left = Math.random() * 100 + 'vw';
      spark.style.animationDuration = (5 + Math.random() * 8) + 's';
      spark.style.animationDelay = (-Math.random() * 10) + 's';
      spark.style.opacity = Math.random();
      document.body.appendChild(spark);
    }
  </script>
</body>
</html>
