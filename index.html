<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NoName | Pantalla de carga</title>
  <style>
    :root {
      --gold: #c9a45b;
      --gold-soft: #ead8a7;
      --violet: #6f35c6;
      --lilac: #a98cf0;
      --gem-blue: #5f8ee8;
      --ink: #050409;
      --panel: rgba(8, 6, 14, .64);
      --progress: 0%;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--ink);
    }

    body {
      color: var(--gold-soft);
      font-family: Georgia, "Times New Roman", serif;
      isolation: isolate;
    }

    .world,
    .vignette,
    .frame {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .world {
      z-index: 0;
      background:
        radial-gradient(ellipse at 50% 36%, rgba(111, 53, 198, .24), transparent 34%),
        radial-gradient(ellipse at 18% 16%, rgba(95, 142, 232, .08), transparent 22%),
        radial-gradient(ellipse at 82% 74%, rgba(201, 164, 91, .12), transparent 28%),
        linear-gradient(125deg, #020203 0%, #0b0810 34%, #1b102c 66%, #050307 100%);
    }

    .world::before {
      content: "";
      position: absolute;
      inset: -8vmax;
      background:
        linear-gradient(115deg, transparent 0 42%, rgba(201, 164, 91, .055) 42.2% 42.6%, transparent 42.8% 100%),
        linear-gradient(65deg, transparent 0 55%, rgba(169, 140, 240, .045) 55.1% 55.5%, transparent 55.8% 100%),
        radial-gradient(ellipse at 50% 46%, transparent 52%, rgba(201, 164, 91, .18) 53% 53.4%, transparent 54.2%),
        radial-gradient(ellipse at 50% 46%, transparent 62%, rgba(169, 140, 240, .10) 63% 63.4%, transparent 64.2%);
      opacity: .72;
    }

    .vignette {
      z-index: 1;
      background:
        radial-gradient(ellipse at 50% 42%, transparent 0 42%, rgba(0, 0, 0, .30) 72%, rgba(0, 0, 0, .86) 100%),
        linear-gradient(180deg, rgba(0, 0, 0, .54), transparent 26%, rgba(0, 0, 0, .70));
    }

    .frame {
      z-index: 5;
      margin: 18px;
      border: 1px solid rgba(201, 164, 91, .32);
      box-shadow:
        inset 0 0 24px rgba(201, 164, 91, .08),
        0 0 28px rgba(111, 53, 198, .14);
    }

    .frame::before,
    .frame::after {
      content: "";
      position: absolute;
      left: 50%;
      width: min(38vw, 420px);
      height: 1px;
      transform: translateX(-50%);
      background: linear-gradient(90deg, transparent, rgba(234, 216, 167, .72), transparent);
    }

    .frame::before { top: -1px; }
    .frame::after { bottom: -1px; }

    .layout {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: grid;
      grid-template-rows: 1fr auto;
      padding: clamp(28px, 4vw, 58px) clamp(28px, 6vw, 92px);
    }

    .hero {
      display: grid;
      place-items: center;
      text-align: center;
    }

    .brand {
      width: min(100%, 980px);
      display: grid;
      justify-items: center;
      transform: translateY(-2vh);
    }

    .sigil {
      width: clamp(172px, 21vmin, 270px);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      margin-bottom: clamp(10px, 2vh, 24px);
      filter:
        drop-shadow(0 18px 34px rgba(0, 0, 0, .58))
        drop-shadow(0 0 12px rgba(111, 53, 198, .18));
    }

    .sigil img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      filter:
        drop-shadow(0 0 10px rgba(111, 53, 198, .24))
        drop-shadow(0 0 7px rgba(201, 164, 91, .16));
    }

    h1 {
      font-size: clamp(82px, 12vw, 176px);
      line-height: .86;
      font-weight: 400;
      letter-spacing: 0;
      background:
        linear-gradient(180deg, #fff0bf 0%, #c9a45b 36%, #74511f 62%, #edd9a2 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-stroke: 1px rgba(64, 39, 20, .58);
      text-shadow:
        0 1px 0 rgba(255, 244, 199, .38),
        0 9px 22px rgba(0, 0, 0, .62),
        0 0 24px rgba(111, 53, 198, .18);
      filter: drop-shadow(0 0 14px rgba(201, 164, 91, .14));
    }

    .subtitle {
      margin-top: clamp(16px, 2.2vh, 24px);
      color: rgba(234, 215, 161, .78);
      font-family: Arial, Helvetica, sans-serif;
      font-size: clamp(12px, 1.55vw, 16px);
      letter-spacing: .36em;
      text-transform: uppercase;
      text-shadow: 0 0 14px rgba(111, 53, 198, .20);
    }

    .download {
      width: min(1120px, 100%);
      justify-self: center;
      display: grid;
      gap: 14px;
      padding-bottom: clamp(4px, 2vh, 24px);
      font-family: Arial, Helvetica, sans-serif;
    }

    .download-top {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: end;
      color: rgba(234, 216, 167, .84);
      text-transform: uppercase;
      letter-spacing: .16em;
      font-size: 12px;
    }

    .status,
    .file {
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .percent {
      color: #f0daa0;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: .06em;
      text-shadow: 0 0 14px rgba(201, 164, 91, .34);
    }

    .bar-shell {
      position: relative;
      height: 18px;
      border: 1px solid rgba(201, 164, 91, .48);
      border-radius: 999px;
      padding: 3px;
      background: rgba(3, 2, 8, .72);
      box-shadow:
        0 0 22px rgba(111, 53, 198, .18),
        inset 0 0 18px rgba(0, 0, 0, .85);
      overflow: hidden;
    }

    .bar {
      height: 100%;
      width: var(--progress);
      border-radius: 999px;
      background: linear-gradient(90deg, #2f1955 0%, #6f35c6 45%, #a98cf0 72%, #c9a45b 100%);
      box-shadow:
        0 0 14px rgba(169, 140, 240, .30),
        0 0 20px rgba(201, 164, 91, .16);
    }

    .download-bottom {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
      color: rgba(234, 216, 167, .62);
      font-size: 12px;
      letter-spacing: .06em;
    }

    .server {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      white-space: nowrap;
    }

    .pill {
      border: 1px solid rgba(201, 164, 91, .24);
      background: var(--panel);
      padding: 7px 10px;
      color: rgba(234, 216, 167, .70);
    }

    @media (max-width: 720px) {
      .layout {
        padding: 26px 20px;
      }

      .brand {
        transform: none;
      }

      .sigil {
        width: clamp(150px, 42vw, 230px);
      }

      .download-top,
      .download-bottom {
        grid-template-columns: 1fr;
      }

      .percent,
      .server {
        justify-self: start;
      }

      .subtitle {
        letter-spacing: .22em;
      }

      .frame {
        margin: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="world" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>
  <div class="frame" aria-hidden="true"></div>

  <main class="layout">
    <section class="hero" aria-label="NoName Roleplay de Hogwarts">
      <div class="brand">
        <div class="sigil">
          <img src="assets/NoName_Magico.png" alt="Emblema NoName" />
        </div>
        <h1>NoName</h1>
        <p class="subtitle">Roleplay de Hogwarts</p>
      </div>
    </section>

    <section class="download" aria-label="Progreso de descarga">
      <div class="download-top">
        <div class="status" id="statusText">Conectando con el servidor...</div>
        <div class="percent" id="percentText">0%</div>
      </div>
      <div class="bar-shell">
        <div class="bar" id="progressBar"></div>
      </div>
      <div class="download-bottom">
        <div class="file" id="fileText">Esperando archivos de FastDL</div>
        <div class="server">
          <span class="pill" id="mapText">Mapa: preparando</span>
          <span class="pill">PHYSGUN</span>
          <span class="pill">GARRY'S MOD</span>
        </div>
      </div>
    </section>
  </main>

  <script>
    const state = {
      totalFiles: 0,
      filesNeeded: 0,
      progress: 0,
      hasRealProgress: false,
      currentFile: "Esperando archivos de FastDL",
      status: "Conectando con el servidor...",
      map: "preparando",
      serverName: "NoName"
    };

    const root = document.documentElement;
    const statusText = document.getElementById("statusText");
    const percentText = document.getElementById("percentText");
    const fileText = document.getElementById("fileText");
    const mapText = document.getElementById("mapText");

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function renderProgress() {
      const progress = clamp(state.progress, 0, 100);
      root.style.setProperty("--progress", progress.toFixed(2) + "%");
      percentText.textContent = Math.round(progress) + "%";
      statusText.textContent = state.status;
      fileText.textContent = state.currentFile;
      mapText.textContent = "Mapa: " + state.map;
    }

    function updateFromFiles() {
      if (state.totalFiles > 0) {
        const downloaded = state.totalFiles - state.filesNeeded;
        state.progress = clamp((downloaded / state.totalFiles) * 100, 0, 100);
        state.status = state.filesNeeded > 0
          ? "Descargando contenido FastDL"
          : "Contenido descargado. Entrando a Hogwarts";
      }
      renderProgress();
    }

    window.SetFilesTotal = function(total) {
      state.totalFiles = Number(total) || 0;
      state.hasRealProgress = state.totalFiles > 0;
      updateFromFiles();
    };

    window.SetFilesNeeded = function(needed) {
      state.filesNeeded = Number(needed) || 0;
      state.hasRealProgress = state.totalFiles > 0;
      updateFromFiles();
    };

    window.DownloadingFile = function(fileName) {
      state.currentFile = fileName ? "Descargando: " + fileName : "Preparando archivo...";
      renderProgress();
    };

    window.SetStatusChanged = function(status) {
      if (status) {
        state.status = status;
        renderProgress();
      }
    };

    window.GameDetails = function(serverName, serverUrl, mapName) {
      if (serverName) state.serverName = serverName;
      if (mapName) state.map = mapName;
      renderProgress();
    };

    renderProgress();
  </script>
</body>
</html>
